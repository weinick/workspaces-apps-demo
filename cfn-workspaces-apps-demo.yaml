AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Amazon WorkSpaces Applications (AppStream 2.0) 通用部署模板
  包含: VPC、NAT Gateway、Security Groups、S3、IAM Role、Image Builder
  Fleet 和 Stack 在镜像制作完成后通过 fleet-stack-deploy.sh 创建
  支持实例类型: General Purpose / Compute / Memory / Graphics G4dn / G5 / G6

Parameters:
  ResourcePrefix:
    Type: String
    Default: my-demo
    Description: 资源命名前缀（用于所有资源命名，建议使用客户名或项目名，如 acme-prod）

  Region:
    Type: String
    Default: ap-southeast-1
    Description: 部署区域 (ap-southeast-1 新加坡 / ap-northeast-1 东京 / us-east-1 弗吉尼亚)

  BaseImageName:
    Type: String
    Default: AppStream-Graphics-G4dn-WinServer2022-11-10-2025
    Description: >
      AppStream Base Image 名称。必须与 Image Builder 实例类型匹配：
      - General Purpose / Compute / Memory: AppStream-WinServer-<OS>-<DATE>
      - Graphics G4dn (NVIDIA T4):  AppStream-Graphics-G4dn-WinServer2022-<DATE>
      - Graphics G5  (NVIDIA A10G): AppStream-Graphics-G5-WinServer2022-<DATE>
      - Graphics G6  (NVIDIA L4):   AppStream-Graphics-G6-WinServer2022-<DATE>
      可在控制台 AppStream > Images > Public Images 中查找最新版本

  ImageBuilderInstanceType:
    Type: String
    Default: stream.graphics.g4dn.xlarge
    Description: >
      Image Builder 实例类型，用于安装软件和制作镜像。
      选择与目标 Fleet 相同或更高规格的实例类型，确保镜像兼容。

      ── General Purpose (通用，适合浏览器/办公应用) ──
        stream.standard.small / medium / large / xlarge / 2xlarge
      ── Compute Optimized (计算密集型) ──
        stream.compute.large / xlarge / 2xlarge / 4xlarge / 8xlarge
      ── Memory Optimized (内存密集型，适合大数据集) ──
        stream.memory.large / xlarge / 2xlarge / 4xlarge / 8xlarge
        stream.memory.z1d.large / xlarge / 2xlarge / 3xlarge / 6xlarge / 12xlarge
      ── Graphics G4dn (NVIDIA T4，GPU 图形/ML 推理) ──
        stream.graphics.g4dn.xlarge / 2xlarge / 4xlarge / 8xlarge / 12xlarge / 16xlarge
      ── Graphics G5 (NVIDIA A10G，高端图形/视频渲染) ──
        stream.graphics.g5.xlarge / 2xlarge / 4xlarge / 8xlarge / 12xlarge / 16xlarge / 24xlarge / 48xlarge
      ── Graphics G6 (NVIDIA L4，新一代 GPU，性价比更高) ──
        stream.graphics.g6.xlarge / 2xlarge / 4xlarge / 8xlarge / 12xlarge / 16xlarge / 24xlarge / 48xlarge
    AllowedValues:
      # ── General Purpose ──────────────────────────────────────
      - stream.standard.small
      - stream.standard.medium
      - stream.standard.large
      - stream.standard.xlarge
      - stream.standard.2xlarge
      # ── Compute Optimized ────────────────────────────────────
      - stream.compute.large
      - stream.compute.xlarge
      - stream.compute.2xlarge
      - stream.compute.4xlarge
      - stream.compute.8xlarge
      # ── Memory Optimized ─────────────────────────────────────
      - stream.memory.large
      - stream.memory.xlarge
      - stream.memory.2xlarge
      - stream.memory.4xlarge
      - stream.memory.8xlarge
      - stream.memory.z1d.large
      - stream.memory.z1d.xlarge
      - stream.memory.z1d.2xlarge
      - stream.memory.z1d.3xlarge
      - stream.memory.z1d.6xlarge
      - stream.memory.z1d.12xlarge
      # ── Graphics G4dn (NVIDIA T4) ────────────────────────────
      - stream.graphics.g4dn.xlarge
      - stream.graphics.g4dn.2xlarge
      - stream.graphics.g4dn.4xlarge
      - stream.graphics.g4dn.8xlarge
      - stream.graphics.g4dn.12xlarge
      - stream.graphics.g4dn.16xlarge
      # ── Graphics G5 (NVIDIA A10G) ────────────────────────────
      - stream.graphics.g5.xlarge
      - stream.graphics.g5.2xlarge
      - stream.graphics.g5.4xlarge
      - stream.graphics.g5.8xlarge
      - stream.graphics.g5.12xlarge
      - stream.graphics.g5.16xlarge
      - stream.graphics.g5.24xlarge
      - stream.graphics.g5.48xlarge
      # ── Graphics G6 (NVIDIA L4) ──────────────────────────────
      - stream.graphics.g6.xlarge
      - stream.graphics.g6.2xlarge
      - stream.graphics.g6.4xlarge
      - stream.graphics.g6.8xlarge
      - stream.graphics.g6.12xlarge
      - stream.graphics.g6.16xlarge
      - stream.graphics.g6.24xlarge
      - stream.graphics.g6.48xlarge

  VpcCidr:
    Type: String
    Default: 10.100.0.0/16
    Description: VPC CIDR

  PublicSubnet1Cidr:
    Type: String
    Default: 10.100.1.0/24

  PublicSubnet2Cidr:
    Type: String
    Default: 10.100.2.0/24

  PrivateSubnet1Cidr:
    Type: String
    Default: 10.100.10.0/24

  PrivateSubnet2Cidr:
    Type: String
    Default: 10.100.11.0/24

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: 基础配置
        Parameters: [ResourcePrefix, Region]
      - Label:
          default: AppStream Image Builder 配置
        Parameters: [BaseImageName, ImageBuilderInstanceType]
      - Label:
          default: 网络配置
        Parameters: [VpcCidr, PublicSubnet1Cidr, PublicSubnet2Cidr, PrivateSubnet1Cidr, PrivateSubnet2Cidr]
    ParameterLabels:
      ResourcePrefix:
        default: "资源命名前缀 (客户名/项目名，如 acme-demo)"
      ImageBuilderInstanceType:
        default: "Image Builder 实例类型 (与目标 Fleet 同系列)"

Resources:

  # ============================================================
  # VPC & 网络
  # ============================================================
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub ${ResourcePrefix}-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${ResourcePrefix}-igw

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref VPC

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: !Ref PublicSubnet1Cidr
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${ResourcePrefix}-public-subnet-1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [1, !GetAZs '']
      CidrBlock: !Ref PublicSubnet2Cidr
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${ResourcePrefix}-public-subnet-2

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: !Ref PrivateSubnet1Cidr
      Tags:
        - Key: Name
          Value: !Sub ${ResourcePrefix}-private-subnet-1

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [1, !GetAZs '']
      CidrBlock: !Ref PrivateSubnet2Cidr
      Tags:
        - Key: Name
          Value: !Sub ${ResourcePrefix}-private-subnet-2

  NatGatewayEIP:
    Type: AWS::EC2::EIP
    DependsOn: InternetGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub ${ResourcePrefix}-nat-eip

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatGatewayEIP.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub ${ResourcePrefix}-nat

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${ResourcePrefix}-public-rt

  DefaultPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet1

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet2

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${ResourcePrefix}-private-rt

  DefaultPrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      SubnetId: !Ref PrivateSubnet1

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      SubnetId: !Ref PrivateSubnet2

  # ============================================================
  # Security Groups
  # ============================================================
  ImageBuilderSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub ${ResourcePrefix}-imagebuilder-sg
      GroupDescription: Security group for AppStream Image Builder
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound (for software download)
      Tags:
        - Key: Name
          Value: !Sub ${ResourcePrefix}-imagebuilder-sg

  FleetSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub ${ResourcePrefix}-fleet-sg
      GroupDescription: Security group for AppStream Fleet
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound
      Tags:
        - Key: Name
          Value: !Sub ${ResourcePrefix}-fleet-sg

  # ============================================================
  # S3 Bucket (存放安装包，Image Builder 用)
  # ============================================================
  InstallerBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${ResourcePrefix}-installers-${AWS::AccountId}
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: !Sub ${ResourcePrefix}-installers

  # ============================================================
  # IAM Role for Image Builder (访问 S3 安装包)
  # ============================================================
  ImageBuilderRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ResourcePrefix}-imagebuilder-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: appstream.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAppStreamServiceAccess
      Policies:
        - PolicyName: S3InstallerAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt InstallerBucket.Arn
                  - !Sub ${InstallerBucket.Arn}/*

  # ============================================================
  # AppStream Image Builder
  # 注意: Image Builder 由 CFN 创建，软件安装需手动完成
  # 步骤: 用 imagebuilder-setup.sh 生成登录 URL → 安装软件 → Image Assistant 打包
  # ============================================================
  AppStreamImageBuilder:
    Type: AWS::AppStream::ImageBuilder
    DependsOn:
      - PrivateSubnet1RouteTableAssociation
      - NatGateway
    Properties:
      Name: !Sub ${ResourcePrefix}-builder
      DisplayName: !Sub ${ResourcePrefix} Image Builder
      Description: !Sub "Image Builder for ${ResourcePrefix} (${ImageBuilderInstanceType})"
      ImageName: !Ref BaseImageName
      InstanceType: !Ref ImageBuilderInstanceType
      VpcConfig:
        SubnetIds:
          - !Ref PrivateSubnet1
        SecurityGroupIds:
          - !Ref ImageBuilderSecurityGroup
      IamRoleArn: !GetAtt ImageBuilderRole.Arn
      EnableDefaultInternetAccess: false
      Tags:
        - Key: Name
          Value: !Sub ${ResourcePrefix}-imagebuilder
        - Key: Environment
          Value: !Ref ResourcePrefix

  # ============================================================
  # Fleet 和 Stack 在自定义镜像制作完成后通过脚本创建
  # 支持多个 Fleet（不同实例类型/镜像），共用同一套网络资源
  # 执行: bash scripts/fleet-stack-deploy.sh <region> <fleet-name> <image> <min> <max> <instance-type> <fleet-type>
  # ============================================================

Outputs:
  VpcId:
    Description: VPC ID
    Value: !Ref VPC
    Export:
      Name: !Sub ${ResourcePrefix}-VpcId

  PrivateSubnet1Id:
    Description: Private Subnet 1 ID (Image Builder / Fleet 使用)
    Value: !Ref PrivateSubnet1
    Export:
      Name: !Sub ${ResourcePrefix}-PrivateSubnet1Id

  PrivateSubnet2Id:
    Description: Private Subnet 2 ID
    Value: !Ref PrivateSubnet2
    Export:
      Name: !Sub ${ResourcePrefix}-PrivateSubnet2Id

  ImageBuilderSecurityGroupId:
    Description: Image Builder Security Group ID
    Value: !Ref ImageBuilderSecurityGroup
    Export:
      Name: !Sub ${ResourcePrefix}-ImageBuilderSgId

  FleetSecurityGroupId:
    Description: Fleet Security Group ID (所有 Fleet 共用)
    Value: !Ref FleetSecurityGroup
    Export:
      Name: !Sub ${ResourcePrefix}-FleetSgId

  InstallerBucketName:
    Description: S3 Bucket for software installers
    Value: !Ref InstallerBucket
    Export:
      Name: !Sub ${ResourcePrefix}-InstallerBucket

  ImageBuilderName:
    Description: AppStream Image Builder Name
    Value: !Ref AppStreamImageBuilder
    Export:
      Name: !Sub ${ResourcePrefix}-ImageBuilderName
